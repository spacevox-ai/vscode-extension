name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Build webview-ui React app (CRITICAL - without this, sidebar is empty!)
      - name: Build webview-ui
        run: |
          cd webview-ui
          npm ci
          npm run build
          ls -la build/assets/

      - name: Lint
        run: npm run lint
        continue-on-error: true  # Don't fail on lint warnings

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-package
          path: '*.vsix'
          retention-days: 7

  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # VS Code extension tests require xvfb on Linux
      - name: Run tests
        run: xvfb-run -a npm test
        continue-on-error: true  # Tests may not be fully set up yet

  build-installers:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install installer dependencies
        run: |
          cd installer
          npm ci

      - name: Create dist directory
        run: mkdir -p dist/installers

      - name: Build Windows EXE
        run: |
          cd installer
          npm run build:win

      - name: Build macOS binary
        run: |
          cd installer
          npm run build:mac

      - name: Build Linux binary
        run: |
          cd installer
          npm run build:linux

      - name: Upload installers artifact
        uses: actions/upload-artifact@v4
        with:
          name: installers
          path: dist/installers/
          retention-days: 7
